# Dependabot: weekly grouped updates (security alerts still open ASAP via GitHub).
version: 2
updates:
  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      extension-deps:
        patterns:
          - '*'
    labels:
      - dependencies
      - extension

  - package-ecosystem: gomod
    directory: /server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      server-deps:
        patterns:
          - '*'
    labels:
      - dependencies
      - server

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
