# Dual Read Server — bootstrap TOML
# Only static process settings belong here.
# Non-secret runtime settings → data/runtime.json (Admin → 设置)
# Secrets (API keys, tokens, passwords) → data/secrets.json (never in runtime.json)
#
#   OPENAI_API_KEY=sk-xxx go run ./cmd/dual-read-server
#   OPENAI_API_KEY=sk-xxx go run ./cmd/dual-read-server -config config.example.toml
#
# Existing v1 data dirs:
#   go run ./cmd/dual-read-server config check --data-dir ./data
#   go run ./cmd/dual-read-server config migrate --from v1 --data-dir ./data

[server]
host = "127.0.0.1"
port = 8080

[admin]
enabled = true
path = "/admin"

# Legacy optional sections below are imported into runtime.json + secrets.json
# on first start only. Prefer configuring via Admin UI afterwards.

# [upstream]
# base_url = "https://api.deepseek.com"

# [auth]
# enabled = true
# [[auth.keys]]
# name = "alice"
# key = "dr-alice-xxxxxxxx"

# [models]
# default = "deepseek-v4-flash"
# [models.map]
# flash = "deepseek-v4-flash"

# [limits]
# enabled = false
# per_ip_per_minute = 60
# per_client_per_minute = 120
# max_inflight_per_client = 6
# max_inflight_upstream = 16
# # Proxy CIDRs whose X-Forwarded-For / X-Real-IP are trusted for per-IP
# # limiting (required behind a reverse proxy, else all traffic shares the
# # proxy's bucket). Env alternative: DUAL_READ_LIMITS_TRUSTED_PROXIES.
# # trusted_proxies = ["172.16.0.0/12"]
#
# Auth tokens at rest are stored as HMAC-SHA256(pepper, token) in secrets.json.
# Pepper: DUAL_READ_AUTH_PEPPER env, or data/auth_pepper (auto-generated).

# Observability (bootstrap / restart-required)
# [metrics]
# enabled = true
# path = "/metrics"
# token = ""   # if set, require Authorization: Bearer <token> or X-Metrics-Token
#
# Probes: GET /livez (liveness), GET /readyz (readiness, 503 when not ready)
# Diagnostic: GET /health (always 200, includes degraded detail)
